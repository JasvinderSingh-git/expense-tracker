<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<header class="header"><h1>Expense Tracker</h1></header>
<section class="filters">
<button class="filter-btn active" data-filter="week">Weekly</button>
<button class="filter-btn" data-filter="month">Monthly</button>
<button class="filter-btn" data-filter="year">Yearly</button>
</section>
<section class="summary-card"><h3>Total Expense</h3><h2 id="totalExpense">₹0.00</h2></section>
<section class="graph-section"><div class="section-title">Expense Graph</div><div id="graph"></div></section>
<section class="history-section">
<div class="history-header"><h2>Expense History</h2><button id="resetBtn">Reset All</button></div>
<div id="expenseHistory"></div>
</section>
</div>

<button id="addExpenseBtn">+</button>

<div id="amountModal" class="modal"><div class="modal-content">
<h2>Enter Amount</h2>
<input type="number" id="amountInput">
<div class="modal-buttons"><button id="cancelAmount">Cancel</button><button id="nextAmount">Next</button></div>
</div></div>

<div id="nameModal" class="modal"><div class="modal-content">
<h2>Spent On</h2>
<input id="expenseNameInput" list="expenseSuggestions">
<datalist id="expenseSuggestions"></datalist>
<div class="modal-buttons"><button id="backName">Back</button><button id="saveExpense">Save</button></div>
</div></div>

<div id="deleteModal" class="modal"><div class="modal-content"><h2>Delete?</h2>
<div class="modal-buttons"><button id="cancelDelete">Cancel</button><button id="confirmDelete" class="danger">Delete</button></div></div></div>

<div id="resetModal" class="modal"><div class="modal-content"><h2>Reset?</h2>
<div class="modal-buttons"><button id="cancelReset">Cancel</button><button id="confirmReset" class="danger">Reset</button></div></div></div>

<script src="script.js"></script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js');}
</script>
</body></html>
